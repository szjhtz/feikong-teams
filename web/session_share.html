<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>会话分享 - 非空小队</title>
  <link rel="icon" href="/static/assets/fkteams-logo.svg" type="image/svg+xml" />
  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
  <style>
    :root {
      --bg: #f8f6f0;
      --panel: #fffdf8;
      --panel-soft: #f0ece2;
      --text: #2f2a22;
      --muted: #7b7162;
      --border: #d8cfc0;
      --accent: #6b7fc6;
      --danger: #d45d5d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    .share-shell {
      max-width: 920px;
      margin: 0 auto;
      padding: 28px 18px 44px;
    }

    .share-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 0 22px;
      border-bottom: 2px dashed var(--border);
    }

    .share-logo {
      width: 38px;
      height: 38px;
      border-radius: 10px;
    }

    .share-title-wrap {
      min-width: 0;
    }

    .share-brand {
      color: var(--muted);
      font-size: 13px;
    }

    .share-title {
      margin: 2px 0 0;
      font-size: 24px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .share-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 16px 0 18px;
    }

    .share-meta span {
      padding: 3px 9px;
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 12px;
    }

    .share-card {
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 14px;
      box-shadow: 4px 5px 0 rgba(60, 50, 30, 0.08);
      overflow: visible;
    }

    .share-password {
      max-width: 420px;
      margin: 48px auto;
      padding: 24px;
    }

    .share-password h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .share-password p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .share-password-row {
      display: flex;
      gap: 8px;
    }

    .share-password input {
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: white;
      color: var(--text);
      font: inherit;
      outline: none;
    }

    .share-password input:focus {
      border-color: var(--accent);
    }

    .share-password button {
      padding: 10px 16px;
      border: 2px solid var(--accent);
      border-radius: 10px;
      background: var(--accent);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .share-error {
      margin-top: 12px;
      color: var(--danger);
      font-size: 13px;
    }

    .share-message {
      margin: 12px;
      padding: 16px 18px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      border-bottom: 1px dashed var(--border);
      background: #fffefb;
    }

    .share-message:last-child {
      border-bottom: 1.5px solid var(--border);
    }

    .share-message.user {
      background: #f4f0ff;
      border-color: rgba(107, 127, 198, 0.28);
    }

    .share-message-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .share-agent {
      font-weight: 800;
      color: var(--accent);
    }

    .share-message.user .share-agent {
      color: #5364a8;
    }

    .share-time {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .share-event {
      margin: 10px 0;
    }

    .share-event.reasoning {
      padding: 10px 12px;
      border-left: 3px solid #d4a54a;
      background: rgba(212, 165, 74, 0.08);
      color: var(--muted);
      font-size: 14px;
    }

    .share-event.tool,
    .share-event.action,
    .share-event.error {
      padding: 10px 12px;
      border-radius: 10px;
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .share-event.error {
      color: var(--danger);
      background: rgba(212, 93, 93, 0.08);
    }

    .share-event pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 8px 0 0;
      padding: 8px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.04);
      overflow-x: auto;
    }

    .markdown-body .footnote-cite {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 14px;
      height: 14px;
      padding: 0 3px;
      margin: 0 1px;
      border: 1.5px solid var(--accent);
      border-radius: 7px;
      background: rgba(107, 127, 198, 0.12);
      color: var(--accent);
      font-size: 9px;
      font-weight: 800;
      line-height: 1;
      text-decoration: none;
      vertical-align: super;
      box-sizing: border-box;
    }

    a.footnote-cite:hover {
      background: var(--accent);
      color: #fff;
    }

    .sources-card {
      margin-top: 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--panel-soft);
    }

    .sources-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      cursor: pointer;
      user-select: none;
    }

    .sources-header:hover {
      background: rgba(107, 127, 198, 0.08);
    }

    .sources-icons {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .source-favicon {
      width: 20px;
      height: 20px;
      border: 2px solid var(--panel-soft);
      border-radius: 50%;
      background: var(--panel);
      object-fit: contain;
    }

    .source-icon-fallback,
    .source-item-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      flex-shrink: 0;
    }

    .source-icon-fallback {
      width: 20px;
      height: 20px;
    }

    .source-icon-fallback svg {
      width: 16px;
      height: 16px;
    }

    .sources-count {
      flex: 1;
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .sources-chevron {
      width: 16px;
      height: 16px;
      color: var(--muted);
      transition: transform 0.15s ease;
      flex-shrink: 0;
    }

    .sources-card.expanded .sources-chevron {
      transform: rotate(180deg);
    }

    .sources-list {
      display: none;
      max-height: 240px;
      overflow-y: auto;
      padding: 6px 0;
      border-top: 1px dashed var(--border);
    }

    .sources-card.expanded .sources-list {
      display: block;
    }

    .source-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      color: var(--muted);
      font-size: 13px;
      text-decoration: none;
    }

    a.source-item:hover {
      background: rgba(107, 127, 198, 0.08);
      color: var(--accent);
    }

    .source-item-favicon {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .source-item-label {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .share-member-panel {
      margin: 12px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: #fbfaf6;
      overflow: hidden;
    }

    .share-member-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px dashed var(--border);
      background: var(--panel-soft);
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
    }

    .share-member-header span:last-child {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .share-member-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
    }

    .share-member-card {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      overflow: hidden;
    }

    .share-member-card summary {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 11px;
      cursor: pointer;
      list-style: none;
      min-width: 0;
    }

    .share-member-card summary::-webkit-details-marker {
      display: none;
    }

    .share-member-card summary::after {
      content: "";
      width: 7px;
      height: 7px;
      border-right: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: rotate(-45deg);
      transition: transform 0.15s ease;
      color: var(--muted);
      flex-shrink: 0;
    }

    .share-member-card[open] summary::after {
      transform: rotate(45deg);
    }

    .share-member-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #5fa56f;
      flex-shrink: 0;
    }

    .share-member-dot.error {
      background: var(--danger);
    }

    .share-member-name {
      max-width: 150px;
      font-weight: 800;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    .share-member-summary {
      flex: 1;
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .share-member-status {
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(95, 165, 111, 0.12);
      color: #4f8d5e;
      font-size: 12px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .share-member-status.error {
      background: rgba(212, 93, 93, 0.1);
      color: var(--danger);
    }

    .share-member-detail {
      padding: 0 11px 11px;
      border-top: 1px dashed var(--border);
    }

    .share-member-message {
      padding-top: 10px;
    }

    .share-member-message + .share-member-message {
      margin-top: 10px;
      border-top: 1px dashed var(--border);
    }

    .share-member-time {
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .share-empty,
    .share-loading {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
    }

    .markdown-body p:first-child {
      margin-top: 0;
    }

    .markdown-body p:last-child {
      margin-bottom: 0;
    }

    .markdown-body pre {
      overflow-x: auto;
      padding: 12px;
      border-radius: 10px;
      background: #272822;
      color: #f8f8f2;
    }

    @media (max-width: 640px) {
      .share-shell {
        padding: 18px 12px 32px;
      }

      .share-title {
        font-size: 20px;
      }

      .share-message {
        margin: 10px;
        padding: 14px;
      }

      .share-message-head,
      .share-password-row {
        flex-direction: column;
        align-items: stretch;
      }

      .share-member-panel {
        margin: 10px;
      }

      .share-member-card summary {
        flex-wrap: wrap;
      }

      .share-member-name {
        max-width: calc(100vw - 150px);
      }

      .share-member-summary {
        flex-basis: 100%;
        order: 5;
        padding-left: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="share-shell">
    <header class="share-header">
      <img class="share-logo" src="/static/assets/fkteams-logo.svg" alt="" />
      <div class="share-title-wrap">
        <div class="share-brand">非空小队会话分享</div>
        <h1 class="share-title" id="share-title">加载中...</h1>
      </div>
    </header>
    <div class="share-meta" id="share-meta"></div>
    <section class="share-card" id="share-password-card" style="display: none">
      <div class="share-password">
        <h2>需要访问密码</h2>
        <p>分享者为这个会话设置了密码。</p>
        <div class="share-password-row">
          <input type="password" id="share-password-input" placeholder="输入访问密码" autocomplete="current-password" />
          <button id="share-password-submit">访问</button>
        </div>
        <div class="share-error" id="share-password-error"></div>
      </div>
    </section>
    <section class="share-card" id="share-content">
      <div class="share-loading">正在加载分享内容...</div>
    </section>
  </div>
  <script src="/static/js/session_share_view.js"></script>
</body>

</html>
